---
# Per-node prep: apt upgrades, utilities, hostname, NVIDIA (if GPU).
# Idempotent. Safe to re-run. Usually invoked via:
#   ./scripts/cluster_manager.py prep-node <host>
- name: Base system setup
  hosts: all
  become: true
  roles:
    - base

- name: NVIDIA driver and Container Toolkit on GPU nodes
  hosts: gpu
  become: true
  roles:
    - nvidia

- name: NFS storage server on storage nodes
  hosts: storage
  become: true
  roles:
    - storage
