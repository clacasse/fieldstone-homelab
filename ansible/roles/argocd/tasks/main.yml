---
- name: Check for unreplaced placeholders
  ansible.builtin.shell: |
    grep -rqE 'repoURL: REPO_URL|APPS_DOMAIN' {{ playbook_dir }}/../clusters/{{ cluster_name }}/
  register: placeholder_check
  changed_when: false
  failed_when: false
  delegate_to: localhost
  become: false
  run_once: true

- name: Fail if placeholders still present
  ansible.builtin.fail:
    msg: |
      Cluster manifests still contain REPO_URL or APPS_DOMAIN placeholders.
      Run ./scripts/cluster_manager.py init-fork before bootstrapping.
  when: placeholder_check.rc == 0

- name: Create argocd namespace
  ansible.builtin.command: k3s kubectl create namespace {{ argocd_namespace }}
  register: ns_create
  failed_when: ns_create.rc != 0 and 'AlreadyExists' not in ns_create.stderr
  changed_when: ns_create.rc == 0

- name: Install Argo CD (pinned version)
  ansible.builtin.shell: |
    k3s kubectl apply -n {{ argocd_namespace }} \
      -f https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml
  register: argo_install
  changed_when: "'created' in argo_install.stdout or 'configured' in argo_install.stdout"

- name: Wait for Argo CD server ready
  ansible.builtin.command: >
    k3s kubectl -n {{ argocd_namespace }} wait
    --for=condition=Available deployment/argocd-server --timeout=300s
  changed_when: false

- name: Configure argocd-server for Ingress (HTTP, TLS terminated upstream)
  ansible.builtin.command: >
    k3s kubectl -n {{ argocd_namespace }}
    patch configmap argocd-cmd-params-cm
    --type merge
    -p {{ {'data': {'server.insecure': 'true'}} | to_json | quote }}
  register: argocd_cm_patch
  changed_when: "'patched' in argocd_cm_patch.stdout and 'no change' not in argocd_cm_patch.stdout"

- name: Restart argocd-server to pick up config
  ansible.builtin.command: >
    k3s kubectl -n {{ argocd_namespace }}
    rollout restart deployment/argocd-server
  when: argocd_cm_patch.changed
  changed_when: true

- name: Wait for argocd-server rollout after restart
  ansible.builtin.command: >
    k3s kubectl -n {{ argocd_namespace }}
    rollout status deployment/argocd-server --timeout=180s
  when: argocd_cm_patch.changed
  changed_when: false

- name: Copy root Application to control node
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../clusters/{{ cluster_name }}/applications/root.yaml"
    dest: /tmp/argocd-root-app.yaml
    mode: '0644'

- name: Apply root Application
  ansible.builtin.command: k3s kubectl apply -f /tmp/argocd-root-app.yaml
  register: apps_apply
  changed_when: "'created' in apps_apply.stdout or 'configured' in apps_apply.stdout"

- name: Print access info
  ansible.builtin.debug:
    msg: |
      Argo CD is running. Once Argo reconciles its Ingress, access it at:
        https://argocd.{{ apps_domain }}

      Retrieve the initial admin password from the control node:
        sudo k3s kubectl -n argocd get secret argocd-initial-admin-secret \
          -o jsonpath='{.data.password}' | base64 -d

      Change it immediately after first login.
