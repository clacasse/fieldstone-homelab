---
- name: Detect repo URL from git remote (on controller)
  ansible.builtin.command:
    cmd: git -C "{{ playbook_dir }}/.." config --get remote.origin.url
  register: git_remote
  changed_when: false
  delegate_to: localhost
  become: false
  run_once: true

- name: Detect current git branch (on controller)
  ansible.builtin.command:
    cmd: git -C "{{ playbook_dir }}/.." rev-parse --abbrev-ref HEAD
  register: git_branch
  changed_when: false
  delegate_to: localhost
  become: false
  run_once: true

- name: Set repo facts
  ansible.builtin.set_fact:
    repo_url: "{{ git_remote.stdout | regex_replace('^git@github\\.com:', 'https://github.com/') | regex_replace('\\.git$', '') }}"
    repo_branch: "{{ git_branch.stdout }}"

- name: Create argocd namespace
  ansible.builtin.command: k3s kubectl create namespace {{ argocd_namespace }}
  register: ns_create
  failed_when: ns_create.rc != 0 and 'AlreadyExists' not in ns_create.stderr
  changed_when: ns_create.rc == 0

- name: Install Argo CD (stable manifests)
  ansible.builtin.shell: |
    k3s kubectl apply -n {{ argocd_namespace }} \
      -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
  register: argo_install
  changed_when: "'created' in argo_install.stdout or 'configured' in argo_install.stdout"

- name: Wait for Argo CD server ready
  ansible.builtin.command: >
    k3s kubectl -n {{ argocd_namespace }} wait
    --for=condition=Available deployment/argocd-server --timeout=300s
  changed_when: false

- name: Render Argo CD Applications
  ansible.builtin.template:
    src: root-app.yaml.j2
    dest: /tmp/argocd-apps.yaml
    mode: '0644'

- name: Apply Argo CD Applications
  ansible.builtin.command: k3s kubectl apply -f /tmp/argocd-apps.yaml
  register: apps_apply
  changed_when: "'created' in apps_apply.stdout or 'configured' in apps_apply.stdout"

- name: Print Argo CD admin password + access info
  ansible.builtin.shell: |
    echo ""
    echo "Argo CD: kubectl -n argocd port-forward svc/argocd-server 8080:443"
    echo -n "admin password: "
    k3s kubectl -n {{ argocd_namespace }} get secret argocd-initial-admin-secret \
      -o jsonpath='{.data.password}' | base64 -d
    echo
    echo ""
    echo "Repo tracked: {{ repo_url }} ({{ repo_branch }})"
  changed_when: false
