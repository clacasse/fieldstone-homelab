---
- name: Check if NVIDIA driver is loaded
  ansible.builtin.command: nvidia-smi
  register: nvidia_smi_check
  failed_when: false
  changed_when: false

- name: Install NVIDIA driver (autodetect; reboot required if newly installed)
  when: nvidia_smi_check.rc != 0
  block:
    - name: Install ubuntu-drivers-common
      ansible.builtin.apt:
        name: ubuntu-drivers-common
        state: present
        update_cache: true

    - name: Auto-install recommended NVIDIA driver
      ansible.builtin.command: ubuntu-drivers install --gpgpu
      register: driver_install
      changed_when: "'installing' in driver_install.stdout.lower() or 'done' in driver_install.stdout.lower()"

    - name: Prompt user to reboot
      ansible.builtin.fail:
        msg: |
          NVIDIA driver installed. Reboot required.
          Run: sudo reboot
          Then re-run ./bootstrap.sh to continue.

- name: Add NVIDIA Container Toolkit GPG key
  ansible.builtin.get_url:
    url: https://nvidia.github.io/libnvidia-container/gpgkey
    dest: /etc/apt/keyrings/nvidia-container-toolkit.asc
    mode: '0644'

- name: Add NVIDIA Container Toolkit repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/nvidia-container-toolkit.list
    mode: '0644'
    content: |
      deb [signed-by=/etc/apt/keyrings/nvidia-container-toolkit.asc] https://nvidia.github.io/libnvidia-container/stable/deb/amd64 /

- name: Install NVIDIA Container Toolkit
  ansible.builtin.apt:
    name: nvidia-container-toolkit
    state: present
    update_cache: true

- name: Verify nvidia-smi works
  ansible.builtin.command: nvidia-smi
  changed_when: false
