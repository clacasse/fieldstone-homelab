apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ollama-metrics
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/clacasse/fieldstone-homelab
    targetRevision: HEAD
    path: clusters/default/apps/ollama-metrics
  destination:
    server: https://kubernetes.default.svc
    namespace: ollama
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
