# Root Application (app-of-apps). Ansible applies this once; Argo CD then
# reconciles everything under applications/children/.
#
# NOTE: REPO_URL and apps are placeholders. Run
#   ./scripts/cluster_manager.py init-fork
# in your instance repo to rewrite them.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/clacasse/fieldstone-homelab
    targetRevision: HEAD
    path: clusters/default/applications/children
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
