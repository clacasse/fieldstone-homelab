apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-workspace
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  nfs:
    server: k3s-storage
    path: /mnt/nas/workspace
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-workspace
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: nfs-workspace
  resources:
    requests:
      storage: 500Gi
