apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-node-overview
  labels:
    grafana_dashboard: "1"
data:
  node-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1 },
            "overrides": []
          },
          "targets": [
            {
              "expr": "1 - avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "title": "Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1 },
            "overrides": []
          },
          "targets": [
            {
              "expr": "1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "title": "CPU Temperature",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "celsius", "min": 0, "max": 100 },
            "overrides": []
          },
          "targets": [
            {
              "expr": "node_hwmon_temp_celsius",
              "legendFormat": "{{instance}} {{chip}} {{sensor}}"
            }
          ]
        },
        {
          "title": "Disk Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1 },
            "overrides": []
          },
          "targets": [
            {
              "expr": "1 - (node_filesystem_avail_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"} / node_filesystem_size_bytes{mountpoint=\"/\",fstype!=\"tmpfs\"})",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "title": "Network Traffic (bytes/sec)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "Bps" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(node_network_receive_bytes_total{device!~\"lo|veth.*|cni.*|flannel.*\"}[5m])",
              "legendFormat": "{{instance}} {{device}} rx"
            },
            {
              "expr": "rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|cni.*|flannel.*\"}[5m])",
              "legendFormat": "{{instance}} {{device}} tx"
            }
          ]
        },
        {
          "title": "System Load (1m)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "node_load1",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "title": "Fan Speed",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "rpm" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "node_hwmon_fan_rpm",
              "legendFormat": "{{instance}} {{chip}} {{sensor}}"
            }
          ]
        },
        {
          "title": "Uptime",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "s" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "time() - node_boot_time_seconds",
              "legendFormat": "{{instance}}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["nodes", "hardware"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Node Overview",
      "uid": "node-overview"
    }
