apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-gpu-monitoring
  labels:
    grafana_dashboard: "1"
data:
  gpu-monitoring.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "GPU Temperature",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "orange", "value": 75 },
                  { "color": "red", "value": 85 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_TEMP",
              "legendFormat": "GPU {{gpu}}"
            }
          ]
        },
        {
          "title": "GPU Utilization",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_UTIL",
              "legendFormat": "GPU {{gpu}}"
            }
          ]
        },
        {
          "title": "GPU Memory Used",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 8000 },
                  { "color": "red", "value": 12000 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_FB_USED",
              "legendFormat": "GPU {{gpu}}"
            }
          ]
        },
        {
          "title": "GPU Power Draw",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 200 },
                  { "color": "red", "value": 300 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_POWER_USAGE",
              "legendFormat": "GPU {{gpu}}"
            }
          ]
        },
        {
          "title": "GPU Temperature (history)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "celsius", "min": 0, "max": 100 },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_TEMP",
              "legendFormat": "GPU {{gpu}}"
            }
          ]
        },
        {
          "title": "GPU Utilization (history)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "percent", "min": 0, "max": 100 },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_UTIL",
              "legendFormat": "GPU {{gpu}}"
            }
          ]
        },
        {
          "title": "GPU Memory (history)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "decmbytes" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_FB_USED",
              "legendFormat": "Used GPU {{gpu}}"
            },
            {
              "expr": "DCGM_FI_DEV_FB_FREE",
              "legendFormat": "Free GPU {{gpu}}"
            }
          ]
        },
        {
          "title": "GPU Power Draw (history)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "watt" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_POWER_USAGE",
              "legendFormat": "GPU {{gpu}}"
            }
          ]
        },
        {
          "title": "GPU SM Clock",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "clockhertz" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_SM_CLOCK * 1000000",
              "legendFormat": "SM Clock GPU {{gpu}}"
            },
            {
              "expr": "DCGM_FI_DEV_MEM_CLOCK * 1000000",
              "legendFormat": "Mem Clock GPU {{gpu}}"
            }
          ]
        },
        {
          "title": "GPU Encoder/Decoder Utilization",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "percent", "min": 0, "max": 100 },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_ENC_UTIL",
              "legendFormat": "Encoder GPU {{gpu}}"
            },
            {
              "expr": "DCGM_FI_DEV_DEC_UTIL",
              "legendFormat": "Decoder GPU {{gpu}}"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["gpu", "nvidia"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "GPU Monitoring",
      "uid": "gpu-monitoring"
    }
