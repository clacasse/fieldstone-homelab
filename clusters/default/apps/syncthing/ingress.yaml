apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: syncthing
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: syncthing.apps
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: syncthing-web
                port:
                  number: 8384
